<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAD — Ecossistema SESP/MT</title>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Libs externas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ── NAV BADGE ── */
.nav-badge {
  display: none;
  align-items: center; justify-content: center;
  min-width: 18px; height: 18px;
  padding: 0 4px;
  background: var(--red);
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  color: #fff;
  margin-left: auto;
  flex-shrink: 0;
}
.nav-item:hover .nav-badge,
.nav-item.active .nav-badge {
  display: inline-flex;
}
.nav-badge { display: inline-flex; }

/* ── BADGE TEAL (Instável) ── */
.badge-teal  { background: rgba(20,184,166,.12); color: #14b8a6; border: 1px solid rgba(20,184,166,.25); }
.kpi-card.teal::after { background: #14b8a6; }
.kpi-card.teal .kpi-value { color: #14b8a6; }

/* ── BUSCA GLOBAL ── */
#search-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 80px;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
#search-overlay.open {
  opacity: 1; pointer-events: all;
}
.search-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
  overflow: hidden;
}
.search-input-wrap {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.search-input-wrap svg {
  width: 18px; height: 18px;
  stroke: var(--text3); fill: none; stroke-width: 2;
  flex-shrink: 0;
}
#search-input {
  background: none; border: none; outline: none;
  font-size: 15px; color: var(--text);
  font-family: var(--sans); flex: 1;
}
#search-input::placeholder { color: var(--text3); }
.search-kbd {
  font-size: 10px; font-family: var(--mono);
  color: var(--text3);
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 6px;
  flex-shrink: 0;
}
#search-results {
  max-height: 380px; overflow-y: auto;
  padding: 8px;
}
.search-result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .1s;
}
.search-result-item:hover {
  background: rgba(255,255,255,.06);
}

/* ── AO VIVO indicator ── */
.live-label {
  font-size: 10px; font-family: var(--mono);
  color: #34d399; font-weight: 700;
  letter-spacing: .08em;
}
</style>
</head>
<body>

<!-- ══ TELA DE LOGIN ══ -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="login-title">GRAD</div>
        <div class="login-sub">Ecossistema SESP/MT</div>
      </div>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="login-email" class="form-input" placeholder="seu@email.com"
               onkeydown="if(event.key==='Enter')Auth.login()">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')Auth.login()">
      </div>
      <div id="login-error" class="login-error" style="display:none"></div>
      <button class="btn btn-primary btn-full" onclick="Auth.login()">Entrar</button>
    </div>
    <div class="login-footer">CIOSP — Telecomunicação — GRAD</div>
  </div>
</div>

<!-- ══ BUSCA GLOBAL (Ctrl+K) ══ -->
<div id="search-overlay" onclick="if(event.target===this)App.closeSearch()">
  <div class="search-box">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" placeholder="Buscar sites, módulos, ocorrências..."
             oninput="App._doSearch(this.value)"
             onkeydown="if(event.key==='Escape')App.closeSearch()">
      <span class="search-kbd">ESC</span>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- ══ APP PRINCIPAL ══ -->
<div id="app" class="layout" style="display:none">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="logo-text">GRAD</div>
        <div class="logo-sub">Ecossistema SESP/MT</div>
      </div>
    </div>
    <div class="topbar-center">
      <span class="live-dot"></span>
      <span class="live-label">AO VIVO</span>
      <span class="topbar-tag" id="topbar-date"></span>
    </div>
    <div class="topbar-right">
      <!-- Busca global -->
      <button class="btn btn-ghost btn-sm" onclick="App.openSearch()" title="Busca global (Ctrl+K)">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span style="font-size:11px;font-family:var(--mono);color:var(--text3)">Ctrl+K</span>
      </button>
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sair</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-section-label">Principal</div>
    <a class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a class="nav-item" data-page="mapa" onclick="App.navigate('mapa')">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      Mapa de ERBs
    </a>
    <a class="nav-item" data-page="base" onclick="App.navigate('base')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><path d="M12 8v13"/><path d="M5 12H2a10 10 0 0020 0h-3"/></svg>
      Base de Sites
    </a>

    <div class="nav-section-label">Ocorrências</div>
    <a class="nav-item" data-page="alertas" onclick="App.navigate('alertas')">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Alertas
      <span class="nav-badge" id="nav-badge-alertas" style="background:#ef4444">0</span>
    </a>
    <a class="nav-item" data-page="ocorrencias" onclick="App.navigate('ocorrencias')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Ocorrências
      <span class="nav-badge" id="nav-badge-ocorrencias" style="background:#ef4444">0</span>
    </a>
    <a class="nav-item" data-page="historico" onclick="App.navigate('historico')">
      <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4M3 3v5h5"/></svg>
      Histórico
    </a>

    <div class="nav-section-label">Operacional</div>
    <a class="nav-item" data-page="missoes" onclick="App.navigate('missoes')">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Missões
    </a>
    <a class="nav-item" data-page="ordens" onclick="App.navigate('ordens')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Ordens de Serviço
    </a>

    <div class="nav-section-label">Terminais</div>
    <a class="nav-item" data-page="issi" onclick="App.navigate('issi')">
      <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      ISSI / GSSI
    </a>

    <div class="nav-section-label">Análise</div>
    <a class="nav-item" data-page="inteligencia" onclick="App.navigate('inteligencia')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Inteligência
    </a>
    <a class="nav-item" data-page="relatorio" onclick="App.navigate('relatorio')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Relatórios
    </a>

    <div class="nav-section-label perm-admin">Sistema</div>
    <a class="nav-item perm-admin" data-page="gerenciar" onclick="App.navigate('gerenciar')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Gerenciar
    </a>
  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main" id="main-content">
    <!-- Páginas carregadas dinamicamente -->
  </main>

</div>

<!-- Scripts -->
<script src="lib/supabase.js"></script>
<script src="lib/auth.js"></script>
<script src="lib/audit.js"></script>
<script src="modules/app.js"></script>
<script src="modules/dashboard.js"></script>
<script src="modules/mapa.js"></script>
<script src="modules/ocorrencias.js"></script>
<script src="modules/historico.js"></script>
<script src="modules/alertas.js"></script>
<script src="modules/base.js"></script>
<script src="modules/missoes.js"></script>
<script src="modules/ordens.js"></script>
<script src="modules/issi.js"></script>
<script src="modules/inteligencia.js"></script>
<script src="modules/relatorio.js"></script>
<script src="modules/gerenciar.js"></script>

</body>
</html>
