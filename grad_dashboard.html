const TABS = ['Dashboard','Registros','Histórico','Alertas','Relatório'];

function destroyCharts() { Object.keys(charts).forEach(k=>{ if(charts[k]){charts[k].destroy();delete charts[k];}}); }

function card(val, lbl, col) {
  return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;">
    <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;">${lbl}</div>
    <div style="font-size:22px;font-weight:500;color:${col};">${val}</div>
  </div>`;
}

function badge(txt, type) {
  const bg={ok:'var(--color-background-success)',warn:'var(--color-background-warning)',err:'var(--color-background-danger)',info:'var(--color-background-info)'};
  const fg={ok:'var(--color-text-success)',warn:'var(--color-text-warning)',err:'var(--color-text-danger)',info:'var(--color-text-info)'};
  return `<span style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;background:${bg[type]};color:${fg[type]};">${txt}</span>`;
}

function panel(title, body, extra='') {
  return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);">
    <div style="padding:11px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);">${title}</div>${extra}
    </div>${body}</div>`;
}

function trow(cells, head=false) {
  const tag=head?'th':'td';
  const bg=head?'background:var(--color-background-secondary);':'';
  return `<tr style="border-top:0.5px solid var(--color-border-tertiary);${bg}">${cells.map(c=>`<${tag} style="padding:7px 11px;text-align:left;font-weight:${head?'500':'400'};color:${head?'var(--color-text-secondary)':'var(--color-text-primary)'};font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c}</${tag}>`).join('')}</tr>`;
}

function infraAlertas() {

    {lv:'Crítico',ico:'▲',msg:'SBS-Cáceres inoperante — energia elétrica cortada',t:'há 2d',c:'err'},

          ['Rádio portátil','MTP3250 / MTH800','612','549','42','21'],
          ['Rádio veicular','MTM5400','298','261','27','10'],
          ['Rádio fixo / consola','MCC7500','87','81','4','2'],
          ['Transceiver ERB','RBS3000','142','134','8','0'],
          ['Gateway / LSC','DIMETRA Express','54','51','3','0'],
          ['Modem backbone','ETH-Link 600','53','13','10','30'],
        ].map((r,i)=>`<tr style="border-top:0.5px solid var(--color-border-tertiary);${i%2?'background:var(--color-background-secondary);':''}">
          <td style="padding:7px 11px;font-size:11px;font-weight:500;color:var(--color-text-primary);">${r[0]}</td>
          <td style="padding:7px 11px;font-size:11px;color:var(--color-text-secondary);">${r[1]}</td>
          <td style="padding:7px 11px;font-size:11px;color:var(--color-text-primary);">${r[2]}</td>
          <td style="padding:7px 11px;font-size:11px;color:var(--color-text-success);">${r[3]}</td>
          <td style="padding:7px 11px;font-size:11px;color:var(--color-text-warning);">${r[4]}</td>
          <td style="padding:7px 11px;font-size:11px;color:var(--color-text-secondary);">${r[5]}</td>
        </tr>`).join('')}
      </table>`)}`;
}

function radioDashboard() {
  return `
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:12px;">
      ${card(47,'Frotas ativas','var(--color-text-primary)')}
      ${card('38.241','Chamadas (mês)','var(--color-text-primary)')}
      ${card('PM-MT','Maior volume','var(--color-text-info)')}
      ${card(2,'Frotas sem registro','var(--color-text-warning)')}
    </div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;">
      ${panel('Chamadas por força — abr/2025',`
        <div style="padding:14px;position:relative;height:170px;">
          <canvas id="cRadio" role="img" aria-label="Barras de chamadas por força de segurança">Chamadas por força.</canvas>
        </div>`)}
      ${panel('Frotas — top 6 por volume',`
        <table style="width:100%;border-collapse:collapse;">
          ${trow(['GSSI','Frota','Força','Rádios','Chamadas'],true)}
          ${[
            ['1001','Rondas Urbanas MT','PM-MT','42','8.421'],
            ['1002','Patrulhamento Rodoviário','PRF','18','5.310'],
            ['2001','GEFRON Sul','GEFRON','24','4.890'],
            ['1004','ROTAM CPA','PM-MT','36','4.102'],
            ['3001','PCMT — Central','PC-MT','29','3.780'],
            ['2003','GEFRON Norte','GEFRON','21','3.210'],
          ].map((r,i)=>`<tr style="border-top:0.5px solid var(--color-border-tertiary);${i%2?'background:var(--color-background-secondary);':''}">
            ${r.map((c,ci)=>`<td style="padding:7px 11px;font-size:11px;color:${ci<2?'var(--color-text-primary)':'var(--color-text-secondary)'};">${c}</td>`).join('')}
          </tr>`).join('')}
        </table>`)}
    </div>`;
}

function initRadioChart() {
  const el=document.getElementById('cRadio'); if(!el) return;
  charts.radio = new Chart(el,{
    type:'bar',
    data:{
      labels:['PM-MT','PRF','GEFRON','PC-MT','CBMMT','Outros'],
      datasets:[{ label:'Chamadas', data:[18421,5310,8100,6280,3980,2150], backgroundColor:['#1D9E75','#378ADD','#EF9F27','#534AB7','#D4537E','#888780'], borderWidth:0, borderRadius:3 }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{font:{size:10},color:'#888'}, grid:{display:false} },
        y:{ ticks:{font:{size:10},color:'#888',callback:v=>`${(v/1000).toFixed(1)}k`}, grid:{color:'rgba(128,128,128,0.1)'}, beginAtZero:true }
      }
    }
  });
}

function genericTab() {
  const msgs={
    'historico':'Linha do tempo de registros encerrados e resolvidos.',
    'relatorio':'Exportação de síntese operacional em PDF e Excel.',
    'registros':'Lançamento e gestão de entradas do módulo.',
    'alertas':'Destaques críticos e notificações pendentes do módulo.',
  };
  const cur=MODS.find(x=>x.id===mod);
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;">
    <div style="font-size:32px;color:var(--color-text-tertiary);">${cur.sym}</div>
    <div style="font-size:14px;font-weight:500;color:var(--color-text-primary);">${TABS.find(t=>t.toLowerCase()===tab)}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);max-width:320px;text-align:center;">${msgs[tab]||''}</div>
    <button style="font-size:11px;margin-top:4px;" onclick="sendPrompt('Me ajude a construir a tela de ${tab} do módulo ${cur.label} do sistema GRAD — Gerência de Radiocomunicação')">Solicitar implementação desta tela ↗</button>
  </div>`;
}

function render() {
  document.getElementById('module-nav').innerHTML = MODS.map(m=>`
    <div onclick="setModule('${m.id}')" style="padding:8px 9px;border-radius:var(--border-radius-md);cursor:pointer;margin-bottom:2px;background:${mod===m.id?'var(--color-background-primary)':'transparent'};border:0.5px solid ${mod===m.id?'var(--color-border-secondary)':'transparent'};">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:7px;">
          <span style="font-size:13px;color:${mod===m.id?'var(--color-text-info)':'var(--color-text-tertiary)'};">${m.sym}</span>
          <span style="font-size:11px;font-weight:${mod===m.id?'500':'400'};color:${mod===m.id?'var(--color-text-primary)':'var(--color-text-secondary)'};">${m.label}</span>
        </div>
        ${m.alerts>0?`<span style="font-size:9px;font-weight:500;background:var(--color-background-danger);color:var(--color-text-danger);padding:1px 5px;border-radius:10px;">${m.alerts}</span>`:''}
      </div>
      <div style="font-size:9px;color:var(--color-text-tertiary);margin-top:1px;padding-left:20px;">${m.sub}</div>
    </div>`).join('');

  const cur=MODS.find(x=>x.id===mod);
  document.getElementById('tb-title').textContent=`${cur.sym} ${cur.label}`;
  document.getElementById('alert-n').textContent=MODS.reduce((a,x)=>a+x.alerts,0);

  document.getElementById('tab-nav').innerHTML=TABS.map(t=>`
    <button onclick="setTab('${t.toLowerCase()}')" style="padding:9px 13px;font-size:11px;font-weight:${tab===t.toLowerCase()?'500':'400'};color:${tab===t.toLowerCase()?'var(--color-text-primary)':'var(--color-text-secondary)'};background:transparent;border:none;border-bottom:2px solid ${tab===t.toLowerCase()?'var(--color-border-primary)':'transparent'};cursor:pointer;margin-bottom:-0.5px;">${t}</button>`).join('');

  destroyCharts();
  const c=document.getElementById('content');
  if (mod==='infra'&&tab==='dashboard'){c.innerHTML=infraDashboard();setTimeout(initInfraCharts,50);}
  else if(mod==='infra'&&tab==='registros'){c.innerHTML=infraRegistros();}
  else if(mod==='infra'&&tab==='alertas'){c.innerHTML=infraAlertas();}
  else if(mod==='bi'&&tab==='dashboard'){c.innerHTML=biDashboard();setTimeout(initBIChart,50);}
  else if(mod==='fin'&&tab==='dashboard'){c.innerHTML=finDashboard();setTimeout(initFinChart,50);}
  else if(mod==='equip'&&tab==='dashboard'){c.innerHTML=equipDashboard();}
  else if(mod==='radio'&&tab==='dashboard'){c.innerHTML=radioDashboard();setTimeout(initRadioChart,50);}
  else{c.innerHTML=genericTab();}
}

function setModule(id){mod=id;tab='dashboard';render();}
function setTab(t){tab=t;render();}

render();
</script>
